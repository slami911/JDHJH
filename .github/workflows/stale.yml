name: Stale Issue Manager

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue has been automatically marked as stale due to inactivity. If no activity occurs within 7 days, it will be closed."
          stale-pr-message: "This PR has been automatically marked as stale due to inactivity. If no activity occurs within 7 days, it will be closed."
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: "security,bug,enhancement"
